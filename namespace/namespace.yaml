apiVersion: v1
kind: Namespace 
metadata:
  name: app-x-dev
  labels:
    environment: dev
    owner: team-a
    cost-center: digital-banking

--- 
# Controla quanto o namespace pode consumir no total
apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-x-dev-quota
  namespace: app-x-dev
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"

--- 
# Define padrões e limites por workload
apiVersion: v1
kind: LimitRange
metadata:
  name: app-x-dev-limits
  namespace: app-x-dev
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "200m"
      memory: "256Mi"
    max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
