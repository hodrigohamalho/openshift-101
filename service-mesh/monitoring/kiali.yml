apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali
  namespace: istio-system
spec:
  external_services:
    prometheus:
      auth:
        type: bearer
        use_kiali_token: true
      thanos_proxy:
        enabled: true
      url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    tracing:
      enabled: true 
      provider: tempo 
      use_grpc: false
      internal_url: http://tempo-tempo-query-frontend.tempo.svc.cluster.local:3200
      external_url: https://tempo-tempo-query-frontend-tempo.apps.cluster-qbwh9.qbwh9.sandbox1170.opentlc.com
      health_check_url: http://tempo-tempo-query-frontend.tempo.svc.cluster.local:3200/ready
      auth: 
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
        insecure_skip_verify: false
        type: bearer
        use_kiali_token: true
      tempo_config:
         url_format: "jaeger" 